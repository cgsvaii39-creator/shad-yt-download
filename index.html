<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shad Yt Download</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Hind Siliguri',sans-serif;
}

body{
background:#ececec;
color:#111;
}

header{
background:#0f0f0f;
padding:18px;
font-size:34px;
font-weight:bold;
color:white;
}

.hero{
background:white;
margin:20px;
padding:40px 20px;
border-radius:0 0 40px 40px;
text-align:center;
}

.logo-box{
width:130px;
height:130px;
margin:auto;
border-radius:30px;
background:linear-gradient(135deg,#ff7300,#ff3d00);
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
color:white;
box-shadow:0 10px 30px rgba(255,115,0,.4);
}

.hero h1{
font-size:50px;
margin-top:25px;
font-weight:700;
}

.hero p{
margin-top:10px;
font-size:24px;
color:#666;
}

.main-box{
background:white;
margin:25px;
padding:25px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.input-box{
background:#f0f0f0;
padding:20px;
border-radius:20px;
display:flex;
align-items:center;
gap:12px;
}

.input-box input{
border:none;
background:none;
width:100%;
font-size:20px;
outline:none;
}

.btn-row{
display:flex;
gap:15px;
margin-top:20px;
}

.small-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:#f0f0f0;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.download-main{
width:100%;
padding:22px;
border:none;
border-radius:22px;
margin-top:20px;
font-size:34px;
font-weight:bold;
background:linear-gradient(to right,#ff8a00,#ff4d00);
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(255,102,0,.35);
}

.preview{
margin:25px;
background:white;
padding:20px;
border-radius:25px;
display:none;
}

.preview img{
width:100%;
border-radius:20px;
}

.title{
font-size:26px;
font-weight:bold;
margin-top:15px;
}

.result-title{
font-size:30px;
font-weight:bold;
margin:25px;
}

.card{
background:white;
margin:20px 25px;
padding:20px;
border-radius:25px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 5px 15px rgba(0,0,0,.06);
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.icon{
width:70px;
height:70px;
border-radius:18px;
background:#fff3e9;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
color:#ff7a00;
}

.q{
font-size:32px;
font-weight:bold;
}

.mb{
font-size:22px;
color:#666;
}

.d-btn{
padding:15px 30px;
border:none;
border-radius:16px;
background:#ff7a00;
color:white;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

footer{
margin-top:40px;
background:#fff;
padding:30px;
text-align:center;
font-size:20px;
}

footer a{
color:#ff6600;
font-weight:bold;
text-decoration:none;
}

.dev{
margin-top:15px;
font-size:20px;
}
</style>
</head>

<body>

<header>
Shad Yt Download
</header>

<div class="hero">

<div class="logo-box">
⬇
</div>

<h1>Shad Yt Download</h1>
<p>দ্রুত ও প্রিমিয়াম ভিডিও ডাউনলোডার</p>

</div>

<div class="main-box">

<div class="input-box">
<span style="font-size:28px;">🔗</span>
<input type="text" id="url" placeholder="YouTube ভিডিও লিংক দিন">
</div>

<div class="btn-row">
<button class="small-btn" onclick="pasteText()">📋 পেস্ট</button>
<button class="small-btn" onclick="clearText()">🗑 মুছুন</button>
</div>

<button class="download-main" onclick="loadVideo()">
⬇ ডাউনলোড করুন
</button>

</div>

<div class="preview" id="preview">
<img id="thumb">

<div class="title" id="videoTitle"></div>
</div>

<div class="result-title" id="resultText"></div>

<div id="results"></div>

<footer>

© 2026 
<a href="https://www.facebook.com/itzz.azizul" target="_blank">
AZIZUL ISLAM SAD
</a>
| All Rights Reserved

<div class="dev">
Developer Contact:
<a href="https://www.facebook.com/itzz.azizul" target="_blank">
AZIZUL ISLAM SAD
</a>
</div>

</footer>

<script>

async function pasteText(){
try{
const text = await navigator.clipboard.readText();
document.getElementById("url").value = text;
}catch{
alert("Paste কাজ করছে না");
}
}

function clearText(){
document.getElementById("url").value="";
}

async function loadVideo(){

const url = document.getElementById("url").value;

if(!url){
alert("লিংক দিন");
return;
}

document.getElementById("resultText").innerHTML="ভিডিও লোড হচ্ছে...";

try{

const res = await fetch("https://shad-yt-download-api.onrender.com/info?url="+encodeURIComponent(url));

const data = await res.json();

document.getElementById("preview").style.display="block";

document.getElementById("thumb").src=data.thumbnail;

document.getElementById("videoTitle").innerText=data.title;

document.getElementById("resultText").innerHTML="ভিডিও পাওয়া গেছে";

document.getElementById("results").innerHTML=`

<div class="card">
<div class="left">
<div class="icon">🎬</div>
<div>
<div class="q">360p</div>
<div class="mb">8 MB</div>
</div>
</div>

<a href="${data.video}" download>
<button class="d-btn">ডাউনলোড</button>
</a>
</div>


<div class="card">
<div class="left">
<div class="icon">🎥</div>
<div>
<div class="q">720p</div>
<div class="mb">15 MB</div>
</div>
</div>

<a href="${data.video}" download>
<button class="d-btn">ডাউনলোড</button>
</a>
</div>


<div class="card">
<div class="left">
<div class="icon">🎵</div>
<div>
<div class="q">MP3</div>
<div class="mb">4 MB</div>
</div>
</div>

<a href="${data.audio}" download>
<button class="d-btn">ডাউনলোড</button>
</a>
</div>

`;

}catch(err){

document.getElementById("resultText").innerHTML="ভিডিও লোড হয়নি";

}

}

</script>

</body>
</html>
