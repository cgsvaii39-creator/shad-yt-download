<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shad Yt Download</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Hind Siliguri',sans-serif;
}

body{
background:#0f0f0f;
color:#fff;
min-height:100vh;
}

header{
padding:40px 20px;
text-align:center;
background:#181818;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
}

.logo-box{
width:120px;
height:120px;
margin:auto;
border-radius:30px;
background:linear-gradient(135deg,#ff9800,#ff3d00);
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
color:#fff;
box-shadow:0 10px 30px rgba(255,120,0,.4);
margin-bottom:20px;
flex-direction:column;
}

.logo-box span{
font-size:14px;
font-weight:700;
margin-top:5px;
}

header h1{
font-size:40px;
font-weight:700;
color:#ff9800;
}

header p{
margin-top:10px;
font-size:18px;
color:#bbb;
}

.container{
width:90%;
max-width:500px;
margin:30px auto;
}

.card{
background:#181818;
padding:25px;
border-radius:30px;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

.input-box{
background:#222;
border-radius:18px;
padding:16px;
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.input-box i{
color:#ff6d00;
font-size:20px;
}

.input-box input{
width:100%;
background:none;
border:none;
outline:none;
color:#fff;
font-size:16px;
}

.btns{
display:flex;
gap:15px;
margin-bottom:20px;
}

.btn-small{
flex:1;
padding:15px;
border:none;
border-radius:15px;
background:#222;
color:#fff;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.download-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#ff9800,#ff3d00);
color:#fff;
font-size:24px;
font-weight:700;
cursor:pointer;
box-shadow:0 10px 20px rgba(255,100,0,.3);
}

#loader{
display:none;
text-align:center;
margin-top:25px;
}

#result{
display:none;
margin-top:25px;
}

.thumb{
width:100%;
border-radius:20px;
margin-bottom:20px;
}

.video-title{
font-size:20px;
font-weight:700;
margin-bottom:20px;
line-height:1.5;
}

.format-card{
background:#181818;
padding:18px;
border-radius:20px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.icon{
width:50px;
height:50px;
border-radius:15px;
background:#222;
display:flex;
justify-content:center;
align-items:center;
color:#ff9800;
font-size:20px;
}

.download-link{
padding:12px 18px;
background:linear-gradient(135deg,#ff9800,#ff3d00);
border-radius:12px;
text-decoration:none;
color:#fff;
font-weight:700;
}

.footer{
text-align:center;
padding:30px 15px;
color:#aaa;
font-size:15px;
margin-top:40px;
}

.footer a{
color:#ff9800;
text-decoration:none;
font-weight:700;
}

.dev{
margin-top:12px;
font-size:15px;
}

#toast{
position:fixed;
bottom:-100px;
left:50%;
transform:translateX(-50%);
background:#222;
padding:15px 25px;
border-radius:30px;
transition:.4s;
z-index:999;
}

#toast.show{
bottom:30px;
}

</style>
</head>
<body>

<header>

<div class="logo-box">
<i class="fas fa-cloud-download-alt"></i>
<span>DOWNLOAD</span>
</div>

<h1>Shad Yt Download</h1>

<p>দ্রুত ও প্রিমিয়াম ভিডিও ডাউনলোডার</p>

</header>

<div class="container">

<div class="card">

<div class="input-box">
<i class="fas fa-link"></i>
<input type="text" id="url" placeholder="ইউটিউব ভিডিও লিংক দিন">
</div>

<div class="btns">

<button class="btn-small" onclick="pasteLink()">
<i class="fas fa-paste"></i>
পেস্ট
</button>

<button class="btn-small" onclick="clearInput()">
<i class="fas fa-trash"></i>
মুছুন
</button>

</div>

<button class="download-btn" onclick="getVideo()">
<i class="fas fa-download"></i>
ডাউনলোড করুন
</button>

<div id="loader">
<br>
<h3>ভিডিও লোড হচ্ছে...</h3>
</div>

</div>

<div id="result">

<img id="thumb" class="thumb">

<h2 id="title" class="video-title"></h2>

<div id="formats"></div>

</div>

</div>

<div class="footer">

© 2026 
<a href="https://www.facebook.com/itzz.azizul" target="_blank">
AZIZUL ISLAM SAD
</a>
| All Rights Reserved

<div class="dev">
Developer Contact:
<a href="https://www.facebook.com/itzz.azizul" target="_blank">
AZIZUL ISLAM SAD
</a>
</div>

</div>

<div id="toast"></div>

<script>

const API = "https://shad-yt-download-api.onrender.com";

function toast(msg){

const t = document.getElementById("toast");

t.innerText = msg;

t.classList.add("show");

setTimeout(()=>{
t.classList.remove("show");
},3000);

}

async function pasteLink(){

try{

const text = await navigator.clipboard.readText();

document.getElementById("url").value = text;

toast("লিংক পেস্ট হয়েছে");

}catch{

toast("পেস্ট করা যায়নি");

}

}

function clearInput(){

document.getElementById("url").value = "";

document.getElementById("result").style.display = "none";

toast("ইনপুট মুছে ফেলা হয়েছে");

}

async function getVideo(){

const url = document.getElementById("url").value;

if(!url){

toast("লিংক দিন");

return;

}

document.getElementById("loader").style.display = "block";

document.getElementById("result").style.display = "none";

try{

const res = await fetch(`${API}/api/download?url=${encodeURIComponent(url)}`);

const data = await res.json();

document.getElementById("loader").style.display = "none";

if(data.error){

toast("ভিডিও লোড হয়নি");

return;

}

document.getElementById("result").style.display = "block";

document.getElementById("thumb").src = data.thumbnail;

document.getElementById("title").innerText = data.title;

const formats = document.getElementById("formats");

formats.innerHTML = "";

data.formats.forEach(item=>{

formats.innerHTML += `

<div class="format-card">

<div class="left">

<div class="icon">
<i class="fas fa-video"></i>
</div>

<div>

<h3>${item.quality}</h3>

<p>${item.size}</p>

</div>

</div>

<a class="download-link" href="${item.url}" download>

ডাউনলোড

</a>

</div>

`;

});

toast("ভিডিও পাওয়া গেছে");

}catch(e){

document.getElementById("loader").style.display = "none";

toast("সার্ভার সমস্যা");

}

}

</script>

</body>
</html>
